<!DOCTYPE html>
<html>

<head>

<title>CampusFlow Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#1c1d20,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI', sans-serif;
}

.login-card{
width:100%;
max-width:400px;
border-radius:15px;
}

.note{
font-size:12px;
text-align:center;
color:red;
padding-top:10px;
}

.note1{
font-size:11px;
text-align:center;
color:red;
}

</style>

</head>

<body>

<div class="card shadow p-4 login-card">

<h3 class="text-center mb-4">CampusFlow Login</h3>

<form method="post">

{% csrf_token %}

{% if form.errors %}
<div class="alert alert-danger text-center">
Invalid username or password
</div>
{% endif %}

<div class="mb-3">

<label class="form-label">Username</label>

<input type="text" name="username" class="form-control" required>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<input type="password" name="password" class="form-control" required>

</div>

<button class="btn btn-primary w-100">
Login
</button>

<div class="text-center mt-3">
For Students -
<a href="/register/">Register here</a>
</div>

<p class="note">
NOTE: Faculty login credentials are provided by the department.
</p>

<p class="note1">
Demo-  id: admin | pass: admin123
</p>

</form>

</div>

</body>

</html>
